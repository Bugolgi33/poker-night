<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Poker Night"/>
<meta name="theme-color" content="#000000"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon.png"/>
<title>Poker Night 🃏</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#FFD60A;--gold2:#FF9F0A;--green:#30D158;--red:#FF453A;--blue:#0A84FF;
  --bg:#000;--bg2:#1C1C1E;--bg3:#2C2C2E;--bg4:#3A3A3C;
  --text:#FFF;--text2:rgba(235,235,245,.8);--text3:rgba(235,235,245,.6);--text4:rgba(235,235,245,.35);
  --sep:#38383A;--sp:cubic-bezier(.34,1.56,.64,1);--ease:cubic-bezier(.25,.46,.45,.94);
  --r:16px;--r2:12px;--r3:10px;
  --font:-apple-system,BlinkMacSystemFont,'Inter','SF Pro Display','Helvetica Neue',sans-serif;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
#app{max-width:430px;margin:0 auto;padding:0 0 110px;min-height:100vh}

/* Typography */
h1{font-size:34px;font-weight:700;letter-spacing:-.5px}
h2{font-size:22px;font-weight:700;letter-spacing:-.3px}
h3{font-size:17px;font-weight:600}

/* Inputs */
input,select{background:var(--bg3);border:none;border-radius:var(--r3);color:var(--text);padding:13px 16px;font-size:17px;font-family:var(--font);outline:none;width:100%;-webkit-appearance:none;transition:background .2s}
input:focus{background:var(--bg4)}
input::placeholder{color:var(--text4)}

/* Buttons */
.btn{background:var(--gold);border:none;border-radius:var(--r);color:#000;padding:16px;font-size:17px;font-family:var(--font);font-weight:600;cursor:pointer;width:100%;transition:transform .15s var(--sp),opacity .15s;-webkit-user-select:none}
.btn:active{transform:scale(.96)}.btn:disabled{opacity:.3;cursor:not-allowed}
.btn2{background:var(--bg3);border:none;border-radius:var(--r);color:var(--text);padding:16px;font-size:17px;font-family:var(--font);font-weight:500;cursor:pointer;width:100%;transition:transform .15s var(--sp),background .15s}
.btn2:active{transform:scale(.96);background:var(--bg4)}
.ghost{background:none;border:1.5px solid var(--sep);border-radius:var(--r3);color:var(--text2);padding:9px 16px;font-size:15px;font-family:var(--font);font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.ghost:active{background:var(--bg3)}.ghost.on{background:var(--gold);color:#000;border-color:var(--gold)}.ghost:disabled{opacity:.3;cursor:not-allowed}
.ico{background:var(--bg3);border:none;border-radius:50%;color:var(--text2);width:36px;height:36px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s var(--sp)}
.ico:active{transform:scale(.88)}

/* Cards / groups */
.cg{background:var(--bg2);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--sep)}
.row:last-child{border-bottom:none}
.card{background:var(--bg2);border-radius:var(--r);padding:16px;margin-bottom:8px;transition:transform .1s}
.card:active{transform:scale(.99)}.card.me{background:#1C1A0E;border:1px solid #3A350A}

/* Nav */
.nav{position:sticky;top:0;z-index:100;background:rgba(0,0,0,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--sep);padding:12px 20px 10px;display:flex;align-items:center;justify-content:space-between}
.nav-title{font-size:17px;font-weight:600;letter-spacing:-.2px}
.nav-l,.nav-r{min-width:70px;display:flex;align-items:center}
.nav-r{justify-content:flex-end;gap:8px}
.nav-btn{background:none;border:none;color:var(--gold);font-size:17px;font-family:var(--font);cursor:pointer;padding:4px 0}

/* Content */
.pg{padding:20px 16px}
.lbl{font-size:13px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:8px}

/* Notification */
#nb{position:fixed;top:0;left:0;right:0;z-index:9999;display:flex;justify-content:center;padding:54px 16px 0;pointer-events:none;transform:translateY(-120%);transition:transform .45s var(--sp)}
#nb.show{transform:translateY(0)}
.nbi{background:rgba(28,28,30,.95);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid var(--sep);border-radius:var(--r);padding:14px 18px;max-width:380px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.6)}
.nbt{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.nbh{font-size:15px;font-weight:600}
.nbs{font-size:13px;color:var(--text3);margin-left:30px}
.nbf{font-size:12px;color:var(--text4);margin-left:30px;margin-top:2px;font-style:italic}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;z-index:500}
.ms{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:430px;max-height:92vh;overflow-y:auto}
.mh{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:12px auto 20px}
.mc{padding:0 20px 40px}
.mtitle{font-size:20px;font-weight:700;margin-bottom:20px}

/* Avatar */
.av{width:44px;height:44px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid var(--sep)}
.av.me{border-color:var(--gold)}

/* Chip badge */
.cbadge{display:inline-flex;align-items:center;gap:5px;background:var(--bg3);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:500;color:var(--text2)}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Settle */
.srow{display:flex;align-items:center;justify-content:space-between;background:#0D1F0D;border:1px solid #1A3A1A;border-radius:var(--r);padding:14px 16px;margin-bottom:8px}

/* Timer */
.timer{font-size:12px;color:var(--text3);font-variant-numeric:tabular-nums}

/* Reactions */
.rbar{display:flex;gap:8px;justify-content:center;padding:8px 0}
.rbtn{font-size:22px;padding:8px 12px;border-radius:12px;background:var(--bg3);border:none;cursor:pointer;transition:transform .15s var(--sp)}
.rbtn:active{transform:scale(1.5)}
.rtoas{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);font-size:52px;z-index:8000;pointer-events:none;animation:rscale .3s var(--sp),rfade 1.5s .4s forwards}

/* Emoji grid */
.egrid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:8px 0}
.eopt{font-size:28px;padding:8px;border-radius:10px;cursor:pointer;text-align:center;transition:background .1s}
.eopt:active{background:var(--bg3)}

/* Denom row */
.dr{display:flex;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid var(--sep)}

/* QR */
#qrb img,#qrb canvas,#qrb2 img,#qrb2 canvas{border-radius:12px!important;display:block}
.urlbox{background:var(--bg3);border-radius:var(--r3);padding:10px 14px;font-size:11px;color:var(--text4);word-break:break-all;user-select:all;cursor:text;line-height:1.5}

/* Animations */
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes si{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}
@keyframes cf{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes rscale{from{opacity:0;transform:translateX(-50%) scale(.3)}to{opacity:1;transform:translateX(-50%) scale(1)}}
@keyframes rfade{to{opacity:0;transform:translateX(-50%) scale(.5) translateY(-40px)}}
.fu{animation:fu .35s var(--ease) both}
.si{animation:si .3s var(--sp) both}
.d1{animation:pulse 1.4s 0s infinite}.d2{animation:pulse 1.4s .2s infinite}.d3{animation:pulse 1.4s .4s infinite}

/* Trophy */
.trophy{background:linear-gradient(135deg,#1C1A0E,#0E1C0E);border:1px solid var(--gold);border-radius:var(--r);padding:20px;margin-bottom:8px;text-align:center}

::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div id="app"></div>
<div id="nb"><div class="nbi">
  <div class="nbt"><span id="nb-ico" style="font-size:20px">🔥</span><span class="nbh" id="nb-hl"></span></div>
  <div class="nbs" id="nb-sub"></div>
  <div class="nbf" id="nb-fish" style="display:none"></div>
</div></div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────────
const CC=["#E5E5E5","#FF453A","#0A84FF","#1C1C1E","#30D158","#FF9F0A","#BF5AF2"];
const CN=["White","Red","Blue","Black","Green","Orange","Purple"];
const EMOJIS=["😎","🤑","😤","🫡","💀","🔥","🐟","🤡","😂","🫠","💸","🎰","🐻","🦁","🐯","👑","🧠","🍀","🫶","💪","🥷","🃏"];
const PV="v6";
const DP=[{id:"d1020",name:"10-20",denoms:[{label:"White",value:.1,ci:0},{label:"Red",value:.2,ci:1},{label:"Green",value:.5,ci:4},{label:"Blue",value:1,ci:2}],qty:[10,10,6,4]}];

// ── STORAGE ───────────────────────────────────────────────────────
async function bCreate(d){const id=uid()+uid();await bSet(id,d);return id;}
async function bGet(id){try{const r=await fetch(`/api/room?id=${id}`);if(!r.ok)return null;return await r.json();}catch{return null;}}
async function bSet(id,data){
  try{const r=await fetch(`/api/room?id=${id}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
  if(!r.ok){const t=await r.text();alert("Storage error: "+t);}
  }catch(e){alert("Network error: "+e.message);}
}

// ── POLLING ───────────────────────────────────────────────────────
let PT=null,PH=[],PS=null;
function poll(rid){
  stop();
  const t=async()=>{const r=await bGet(rid);if(!r)return;const s=JSON.stringify(r);if(s!==PS){PS=s;PH.forEach(h=>h(r));}};
  t();PT=setInterval(t,2500);
}
function stop(){clearInterval(PT);PT=null;PH=[];PS=null;}
function onSync(f){PH.push(f);return()=>{PH=PH.filter(h=>h!==f);};}

// ── UTILS ─────────────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,9);
const fmt=c=>{const d=c/100;return d%1===0?`$${d}`:`$${d.toFixed(2)}`;};
const rUrl=id=>`${location.origin}${location.pathname}?room=${id}`;
const $=id=>document.getElementById(id);
function cp(text,bid){
  const done=()=>{if(!bid)return;const b=$(bid);if(!b)return;b.textContent="Copied!";b.style.color="var(--green)";setTimeout(()=>{b.textContent="Copy link";b.style.color=""},2000);};
  navigator.clipboard?navigator.clipboard.writeText(text).then(done).catch(fb):fb();
  function fb(){const t=document.createElement("textarea");t.value=text;t.style.cssText="position:fixed;opacity:0";document.body.appendChild(t);t.focus();t.select();try{document.execCommand("copy");done();}catch{}document.body.removeChild(t);}
}
function qr(cid,url,sz=160){
  const el=$(cid);if(!el)return;el.innerHTML="";
  if(window.QRCode)try{new QRCode(el,{text:url,width:sz,height:sz,colorDark:"#FFD60A",colorLight:"#1C1C1E",correctLevel:QRCode.CorrectLevel.M});}catch{el.innerHTML=`<div style="width:${sz}px;height:${sz}px;background:var(--bg3);border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px;text-align:center;padding:8px">Use copy link</div>`;}
}
const isEmoji=s=>s&&/\p{Emoji}/u.test(s);

// ── SOUND / FX ────────────────────────────────────────────────────
function click(){try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.setValueAtTime(.08,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.04);o.start();o.stop(c.currentTime+.04);setTimeout(()=>c.close(),100);}catch{}}
function flash5horn(){
  const f=document.createElement("div");f.style.cssText="position:fixed;inset:0;background:#fff;z-index:99999;pointer-events:none;opacity:0";document.body.appendChild(f);
  let n=0;(function nxt(){if(n>=5){f.remove();return;}f.style.opacity="1";setTimeout(()=>{f.style.opacity="0";n++;setTimeout(nxt,50);},60);})();
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const cmp=ctx.createDynamicsCompressor();cmp.threshold.value=-6;cmp.ratio.value=20;cmp.connect(ctx.destination);const mg=ctx.createGain();mg.gain.value=3;mg.connect(cmp);
  const pt=(freq,st,dt)=>{["sawtooth","square","sawtooth"].forEach((tp,ix)=>{const o=ctx.createOscillator();const g=ctx.createGain();const dv=ctx.createWaveShaper();const cv=new Float32Array(512);for(let i=0;i<512;i++){const x=i*2/512-1;cv[i]=Math.tanh(x*4);}dv.curve=cv;o.type=tp;o.frequency.setValueAtTime(freq*(ix===1?1.01:ix===2?.99:1),ctx.currentTime+st);g.gain.setValueAtTime(0,ctx.currentTime+st);g.gain.linearRampToValueAtTime(.8,ctx.currentTime+st+.01);g.gain.setValueAtTime(.8,ctx.currentTime+st+dt-.04);g.gain.linearRampToValueAtTime(0,ctx.currentTime+st+dt);o.connect(dv);dv.connect(g);g.connect(mg);o.start(ctx.currentTime+st);o.stop(ctx.currentTime+st+dt);});};
  pt(440,.0,.13);pt(554,.0,.13);pt(440,.17,.13);pt(554,.17,.13);pt(440,.34,.55);pt(554,.34,.55);pt(660,.34,.55);pt(880,.34,.55);setTimeout(()=>ctx.close(),2e3);}catch{}
}
function confetti(){const cols=["#FFD60A","#FF9F0A","#30D158","#0A84FF","#FF453A","#BF5AF2"];for(let i=0;i<60;i++){const e=document.createElement("div");const c=cols[Math.floor(Math.random()*cols.length)];const s=Math.random()*8+4;e.style.cssText=`position:fixed;top:-20px;left:${Math.random()*100}vw;width:${s}px;height:${s}px;background:${c};border-radius:${Math.random()>.5?"50%":"2px"};z-index:9998;pointer-events:none;animation:cf ${1.5+Math.random()*2}s ${Math.random()}s ease-in forwards`;document.body.appendChild(e);setTimeout(()=>e.remove(),4e3);}}
function showRx(em){const e=document.createElement("div");e.className="rtoas";e.textContent=em;document.body.appendChild(e);setTimeout(()=>e.remove(),2500);}

// ── ROASTS ────────────────────────────────────────────────────────
const RS=[["is warming up 🎯","First buyin. Full of hope."],["doubles down 😤","Second wind. Dangerous or delusional."],["won't quit 🩸","Third buyin. The classic 'one more hand'."],["is on a mission 🚂","Fourth buyin. Respect the commitment."],["needs a moment 😰","Five buyins. This is fine."],["is a menace 🤡","Six buyins. Just enjoy the ride."],["is funding the game 💸","Seven. The table thanks you."],["said it's just money 🤷","Eight. Philosopher of the felt."],["is the table's ATM 🏧","Nine. Someone check on them."],["IS the pot now 🪙","Ten buyins. Certified legend."],["transcended loss 🌀","Eleven. Performance art."],["entered another realm 🌌","Twelve. The felt claims another."],["is a poker legend 🏆","Thirteen. Stories will be told."],["broke the simulation 💻","Fourteen. Does it even matter?"],["is writing a memoir 📖","Fifteen. Chapter: How I Funded Everyone."]];
const roast=(n,c)=>{const r=RS[Math.min(c-1,RS.length-1)];return{hl:`${n} ${r[0]}`,sub:r[1]};};
const fish=(n,c)=>c>=16?`🐟 Something smells fishy… it's ${n}.`:c>=10?`🎣 ${n} giving off fish vibes.`:c>=6?`👀 ${n} might be a little… fishy.`:null;

// ── NOTIFICATION ──────────────────────────────────────────────────
let nt;
function notif(n){
  $("nb-hl").textContent=n.hl||"";$("nb-sub").textContent=n.sub||"";
  const f=$("nb-fish");f.textContent=n.fish||"";f.style.display=n.fish?"block":"none";
  $("nb").classList.add("show");clearTimeout(nt);nt=setTimeout(()=>$("nb").classList.remove("show"),5000);
}

// ── SETTLEMENT ────────────────────────────────────────────────────
function settle(players){
  const b=players.map(p=>({name:p.name,bal:(p.cv||0)-(p.tb||0)}));
  const de=b.filter(x=>x.bal<0).map(x=>({...x})),cr=b.filter(x=>x.bal>0).map(x=>({...x}));
  const tx=[];let i=0,j=0;
  while(i<de.length&&j<cr.length){const a=Math.min(-de[i].bal,cr[j].bal);if(a>0)tx.push({from:de[i].name,to:cr[j].name,amt:a});de[i].bal+=a;cr[j].bal-=a;if(Math.abs(de[i].bal)<1)i++;if(Math.abs(cr[j].bal)<1)j++;}
  return tx;
}
function buyinCnt(p,game){const st=game?.startingStack||S.ba||1000;return Math.max(1,Math.round((p.buyins||[]).reduce((s,b)=>s+b.amount,0)/st));}

// ── PRESETS ───────────────────────────────────────────────────────
function getP(){
  try{if(localStorage.getItem("pv")!==PV){localStorage.setItem("presets",JSON.stringify(DP));localStorage.setItem("pv",PV);}const s=localStorage.getItem("presets");return s?JSON.parse(s):DP;}catch{return DP;}
}
function saveP(p){localStorage.setItem("presets",JSON.stringify(p));}
function renameP(id){const p=getP();const pr=p.find(x=>x.id===id);if(!pr)return;const n=prompt("Rename:",pr.name);if(n?.trim()){pr.name=n.trim();saveP(p);const e=$("pl");if(e)e.innerHTML=presetsHtml();}}
function deleteP(id){const p=getP();const pr=p.find(x=>x.id===id);if(!pr||!confirm(`Delete "${pr.name}"?`))return;saveP(p.filter(x=>x.id!==id));const e=$("pl");if(e)e.innerHTML=presetsHtml();}
function loadP(id){const pr=getP().find(x=>x.id===id);if(!pr)return;S.gname=pr.name;S.denoms=pr.denoms.map(d=>({...d}));S.sc=pr.qty?[...pr.qty]:pr.denoms.map(()=>1);S.ba=pr.qty?pr.denoms.reduce((s,d,i)=>s+(pr.qty[i]||1)*d.value*100,0):1000;render();}
function presetsHtml(){
  const p=getP();if(!p.length)return`<span style="color:var(--text4);font-size:14px">No presets yet</span>`;
  return p.map(x=>`<div style="display:flex;align-items:center;background:var(--bg3);border-radius:var(--r3);overflow:hidden;margin-bottom:6px">
  <button style="flex:1;background:none;border:none;color:var(--text);font-size:16px;font-family:var(--font);text-align:left;padding:13px 16px;cursor:pointer;font-weight:500" onclick="loadP('${x.id}')">${x.name}</button>
  <button style="background:none;border:none;border-left:1px solid var(--sep);color:var(--text3);cursor:pointer;padding:13px 10px;font-size:15px" onclick="renameP('${x.id}')">✏️</button>
  <button style="background:none;border:none;border-left:1px solid var(--sep);color:var(--text4);cursor:pointer;padding:13px 12px;font-size:18px" onclick="deleteP('${x.id}')">×</button>
</div>`).join("");
}

// ── TABLE SVG ─────────────────────────────────────────────────────
function table(players,myId,max=9){
  const W=360,H=220,cx=W/2,cy=H/2,rx=138,ry=82;
  const seats=Array.from({length:max},(_,i)=>{const a=(i/max)*2*Math.PI-Math.PI/2;return{x:cx+rx*Math.cos(a),y:cy+ry*Math.sin(a)};});
  function fi(rb){return Math.min(rb-1,9)/9;}
  function fire(sx,sy,rb,ix){
    const t=fi(rb);if(rb<2)return"";
    const ic=t<.33?"#f0a020":t<.66?"#e05010":"#cc1010";const oc=t<.33?"#f0c040":t<.66?"#f06020":"#ff2200";
    const gc=t<.33?"rgba(240,192,64,.35)":t<.66?"rgba(240,96,32,.35)":"rgba(255,34,0,.35)";
    const gr=20+t*14;const nf=Math.round(2+t*4);const id=`fx${ix}`;
    let d=`<defs><radialGradient id="${id}g" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="${oc}"/><stop offset="60%" stop-color="${ic}"/><stop offset="100%" stop-color="#880000"/></radialGradient><filter id="${id}f" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="${(3+t*5).toFixed(1)}"/></filter></defs>`;
    d+=`<circle cx="${sx}" cy="${sy}" r="${gr.toFixed(1)}" fill="${gc}" filter="url(#${id}f)"><animate attributeName="r" values="${gr.toFixed(1)};${(gr+t*5).toFixed(1)};${gr.toFixed(1)}" dur=".8s" repeatCount="indefinite"/><animate attributeName="opacity" values=".7;.3;.7" dur=".8s" repeatCount="indefinite"/></circle>`;
    for(let fi2=0;fi2<nf;fi2++){const sp=28*t;const of=(fi2/(nf-1||1)-.5)*sp;const fx=sx+of;const fy=sy-16;const fh=8+t*14;const fw=4+t*3;const dr=(.4+fi2*.12).toFixed(2);const dl=(fi2*.08).toFixed(2);d+=`<ellipse cx="${fx.toFixed(1)}" cy="${(fy-fh/2).toFixed(1)}" rx="${fw.toFixed(1)}" ry="${(fh/2).toFixed(1)}" fill="url(#${id}g)" opacity="${(.5+t*.4).toFixed(2)}"><animate attributeName="ry" values="${(fh/2).toFixed(1)};${(fh/2*1.4).toFixed(1)};${(fh/2*.7).toFixed(1)};${(fh/2).toFixed(1)}" dur="${dr}s" begin="${dl}s" repeatCount="indefinite"/><animate attributeName="cy" values="${(fy-fh/2).toFixed(1)};${(fy-fh/2-3).toFixed(1)};${(fy-fh/2+2).toFixed(1)};${(fy-fh/2).toFixed(1)}" dur="${dr}s" begin="${dl}s" repeatCount="indefinite"/></ellipse>`;}
    return d;
  }
  const ss=seats.map((s,i)=>{
    const p=players[i];const me=p?.id===myId;
    if(!p)return`<circle cx="${s.x}" cy="${s.y}" r="19" fill="#111" stroke="#2A2A2C" stroke-width="1.5"/><text x="${s.x}" y="${s.y+5}" text-anchor="middle" font-size="14" fill="#3A3A3C">+</text>`;
    const rb=Math.min(p.buyinCount||1,10);const t=fi(rb);
    const cf=rb<2?(me?"#1e1400":"#1C1C1E"):t<.33?(me?"#1e1000":"#130a00"):t<.66?(me?"#1e0800":"#0f0400"):"#0a0000";
    const cs=rb<2?(me?"#FFD60A":"#3A3A3C"):t<.33?"#f07020":t<.66?"#e03010":"#cc0000";
    const tc=rb<2?(me?"#FFD60A":"#ddd"):t<.33?"#f0a030":t<.66?"#ff6020":"#ff3010";
    const av=p.avatar||p.name.slice(0,2).toUpperCase();const ise=isEmoji(av);
    return`${fire(s.x,s.y,rb,i)}<circle cx="${s.x}" cy="${s.y}" r="19" fill="${cf}" stroke="${cs}" stroke-width="${me?2.5:1.5}"/>
${ise?`<text x="${s.x}" y="${s.y+6}" text-anchor="middle" font-size="15">${av}</text>`:`<text x="${s.x}" y="${s.y+4}" text-anchor="middle" font-size="10" fill="${tc}" font-family="-apple-system,sans-serif" font-weight="600">${av}</text>`}
${rb>1?`<circle cx="${s.x+14}" cy="${s.y-14}" r="8" fill="${t>.66?"#8b0000":t>.33?"#c0392b":"#FF453A"}"/><text x="${s.x+14}" y="${s.y-11}" text-anchor="middle" font-size="8" fill="white" font-weight="700">${rb}</text>`:""}`; 
  }).join("");
  return`<div style="width:100%;margin:0 0 16px"><svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">
<ellipse cx="${cx}" cy="${cy}" rx="${rx-8}" ry="${ry-8}" fill="#0D2010" stroke="#1A3A1A" stroke-width="3"/>
<ellipse cx="${cx}" cy="${cy}" rx="${rx-20}" ry="${ry-20}" fill="none" stroke="#1A3A1A" stroke-width="1" stroke-dasharray="4 4" opacity=".5"/>
<text x="${cx}" y="${cy+5}" text-anchor="middle" fill="#1A3A1A" font-size="11" font-family="-apple-system,serif" letter-spacing="2" font-weight="600">POKER NIGHT</text>
${ss}</svg></div>`;
}

// ── STACK CALC ────────────────────────────────────────────────────
function stackTotal(){
  if(!S.denoms?.every(d=>d.label&&d.value>0))return S.ba||1000;
  S.denoms.forEach((_,i)=>{const inp=$(`sc_${i}`);if(inp)S.sc[i]=parseInt(inp.value)||1;});
  return S.denoms.reduce((s,d,i)=>s+(S.sc?.[i]||1)*d.value*100,0)||S.ba||1000;
}

async function addBuyin(pid){
  try{
    const r=await bGet(S.binId);if(!r){alert("Room not found");return;}
    const i=r.players.findIndex(p=>p.id===pid);if(i<0)return;
    r.players[i].buyins=[...(r.players[i].buyins||[]),{amount:S.ba,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}];
    const cnt=buyinCnt(r.players[i],r.game);
    const ro=roast(r.players[i].name,cnt);const fi2=fish(r.players[i].name,cnt);
    const n={hl:ro.hl,sub:ro.sub,fish:fi2};const eid=uid();
    r.events=[...(r.events||[]),{id:eid,pid,n,ts:Date.now()}];
    if(r.events.length>60)r.events=r.events.slice(-60);
    await bSet(S.binId,r);notif(n);flash5horn();S.seen.add(eid);
  }catch(err){alert("Error: "+err.message);}
}
async function undoBuyin(pid){
  if(!confirm("Remove last buyin?"))return;
  try{const r=await bGet(S.binId);if(!r)return;const i=r.players.findIndex(p=>p.id===pid);if(i<0)return;const b=r.players[i].buyins||[];if(!b.length)return;r.players[i].buyins=b.slice(0,-1);await bSet(S.binId,r);}catch(err){alert("Error: "+err.message);}
}
async function sendRx(em){
  showRx(em);
  try{const r=await bGet(S.binId);if(!r)return;const eid=uid();r.events=[...(r.events||[]),{id:eid,type:"rx",emoji:em,pid:S.myId,ts:Date.now()}];if(r.events.length>60)r.events=r.events.slice(-60);await bSet(S.binId,r);S.seen.add(eid);}catch{}
}

async function handlePhoto(input){
  const file=input.files[0];if(!file)return;
  const body=$("pbody");
  const img2=new Image();
  img2.onload=async()=>{
    const canvas=document.createElement("canvas");const MAX=800;const sc=Math.min(1,MAX/Math.max(img2.width,img2.height));canvas.width=img2.width*sc;canvas.height=img2.height*sc;canvas.getContext("2d").drawImage(img2,0,0,canvas.width,canvas.height);
    const dataUrl=canvas.toDataURL("image/jpeg",.7);const b64=dataUrl.split(",")[1];const prev=dataUrl;
    if(body)body.innerHTML=`<div style="text-align:center;padding:48px 0"><div style="font-size:44px;margin-bottom:16px">🤖</div><div style="font-size:17px;font-weight:600">Counting chips…</div><div style="font-size:14px;color:var(--text3);margin-top:6px">AI is analyzing your stack</div></div>`;
    const dn=S.room?.game?.denoms||[];const dl=dn.map(d=>`${d.label}=${fmt(d.value*100)} (${CN[d.ci]})`).join(", ");
    try{
      const res=await fetch("/api/ai-chips",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({imageBase64:b64,mimeType:"image/jpeg",denomList:dl})});
      const data=await res.json();if(data.error)throw new Error("API error: "+data.error);
      const txt=(data.text||"").trim();if(!txt)throw new Error("Empty response. Check ANTHROPIC_API_KEY.");
      const jm=txt.match(/\{[\s\S]*\}/);if(!jm)throw new Error("No JSON: "+txt.slice(0,80));
      const parsed=JSON.parse(jm[0]);const counts=parsed.counts||{};window._pc={...counts};
      const tot=dn.reduce((s,d)=>s+(counts[d.label]||0)*d.value*100,0);
      if(body)body.innerHTML=`<img src="${prev}" style="width:100%;border-radius:var(--r);margin-bottom:14px;max-height:160px;object-fit:cover"/>
${parsed.notes?`<div style="background:var(--bg3);border-radius:var(--r3);padding:10px 14px;margin-bottom:14px;color:var(--text3);font-size:14px;font-style:italic">🤖 "${parsed.notes}"</div>`:""}
${dn.map(d=>`<div class="row" style="gap:12px"><div style="width:18px;height:18px;border-radius:50%;background:${CC[d.ci]};flex-shrink:0"></div><span style="flex:1;font-size:16px">${d.label} <span style="color:var(--text3);font-size:13px">(${fmt(d.value*100)})</span></span><button class="ico" onclick="apc('${d.label}',-1)">−</button><input type="number" id="pc_${d.label}" value="${counts[d.label]||0}" min="0" style="width:52px;text-align:center;font-size:16px;background:var(--bg3);border-radius:8px;padding:8px" onchange="window._pc['${d.label}']=parseInt(this.value)||0;upt()"/><button class="ico" onclick="apc('${d.label}',1)">+</button></div>`).join("")}
<div class="row" style="margin-top:8px"><span style="font-size:17px;font-weight:600">Total</span><span style="font-size:24px;font-weight:700;color:var(--gold)" id="ptot">${fmt(tot)}</span></div>
<div style="display:flex;gap:8px;margin-top:16px"><button class="btn2" onclick="S.pid=null;render()" style="flex:1">Cancel</button><button class="btn" onclick="savePhoto()" style="flex:2">Save</button></div>`;
    }catch(err){if(body)body.innerHTML=`<div style="text-align:center;padding:40px 0"><div style="font-size:44px;margin-bottom:16px">😬</div><div style="font-size:17px;font-weight:600;color:var(--red);margin-bottom:8px">Couldn't count chips</div><div style="font-size:14px;color:var(--text3);margin-bottom:6px">${err?.message||"Unknown error"}</div><div style="display:flex;gap:8px;margin-top:20px"><button class="btn2" onclick="S.pid=null;render()" style="flex:1">Close</button><button class="btn" onclick="$('pfile').click()" style="flex:1">Retry</button></div></div>`;}
  };
  img2.src=URL.createObjectURL(file);
}
function apc(l,d){if(!window._pc)window._pc={};window._pc[l]=Math.max(0,(window._pc[l]||0)+d);const i=$(`pc_${l}`);if(i)i.value=window._pc[l];upt();}
function upt(){const dn=S.room?.game?.denoms||[];const t=dn.reduce((s,d)=>s+(window._pc?.[d.label]||0)*d.value*100,0);const e=$("ptot");if(e)e.textContent=fmt(t);}
async function savePhoto(){const counts=window._pc||{};const r=await bGet(S.binId);if(!r)return;const i=r.players.findIndex(p=>p.id===S.pid);if(i>=0)r.players[i].chips={...counts};await bSet(S.binId,r);S.pid=null;window._pc=null;render();}

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
(async()=>{
  const dp=(()=>{try{const s=localStorage.getItem("presets");if(s){const p=JSON.parse(s);if(p?.[0])return p[0];}}catch{}return DP[0];})();
  S.gname=dp.name;S.denoms=dp.denoms.map(d=>({...d}));S.sc=dp.qty?[...dp.qty]:dp.denoms.map(()=>1);S.ba=dp.qty?dp.denoms.reduce((s,d,i)=>s+(dp.qty[i]||1)*d.value*100,0):1000;

  // Click sounds on all buttons
  document.addEventListener("click",e=>{if(e.target.tagName==="BUTTON"||e.target.closest("button"))click();},true);

  const rid=new URLSearchParams(location.search).get("room");
  if(rid){S.roomId=rid;S.screen="join";}
  render();
})();
</script>
<script>if("serviceWorker" in navigator)navigator.serviceWorker.register("/sw.js").catch(()=>{});</script>
</body>
</html>
